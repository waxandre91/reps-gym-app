function mkTheme(mode='dark', accent='#c5f24a') {
  const dark = mode === 'dark';
  const accInk = { '#c5f24a':'#0a0c08', '#ff7a3d':'#1a0902', '#5fb8ff':'#02111a' }[accent] || '#0a0c08';
  return {
    mode, accent,
    bg:    dark?'#0e0f0d':'#f3f5ee',
    card:  dark?'#1a1c19':'#ffffff',
    card2: dark?'#23261f':'#e7ebde',
    ink:   dark?'#f3f4ef':'#16180f',
    ink2:  dark?'#7e837a':'#5d6155',
    rule:  dark?'#26291f':'#dee2d2',
    hi: accent, hiInk: accInk,

// ─── STATE ────────────────────────────────────────────────────────────
function loadS() { try { return JSON.parse(localStorage.getItem(SK)); } catch { return null; } }
function saveS(s) { try { localStorage.setItem(SK, JSON.stringify(s)); } catch {} }
function blank() {
  return {
    setup: false,
    profile: { name:'', sex:'M', age:28, weight:75, height:178, goal:'mass' },
    prefs: { mode:'dark', accent:'#c5f24a' },
    schedule: { ...DEF_SCHEDULE },
    programs: JSON.parse(JSON.stringify(TEMPLATES)),
    sessions: [],
    activeSessionId: null,
    lastBackup: null,
    weightLog: [], // [{date:'2026-05-16', kg:75.5}]
  };
}
function useAppState() {
  const [s, setS] = React.useState(() => {
    const loaded = loadS();
    if (!loaded) return blank();
    if (!loaded.programs) loaded.programs = JSON.parse(JSON.stringify(TEMPLATES));
    if (!('lastBackup' in loaded)) loaded.lastBackup = null;
    if (!loaded.weightLog) loaded.weightLog = [];
    return loaded;
  });
  React.useEffect(() => { saveS(s); }, [s]);
  const upd = React.useCallback((fn) => {
    setS(p => typeof fn === 'function' ? fn(p) : { ...p, ...fn });
  }, []);
  return [s, upd];
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function todayStr() { return new Date().toISOString().slice(0,10); }
function isoDate(s) { return new Date(s+'T00:00:00'); }
function dayName(d) { return ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'][d.getDay()]; }
function monthName(m) { return ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'][m]; }
function fmtDateShort(d) {
  const dt = typeof d==='string'?isoDate(d):d;
  return `${['Dom','Lun','Mar','Mer','Gio','Ven','Sab'][dt.getDay()]} ${dt.getDate()} ${['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'][dt.getMonth()]}`;
}
function fmtElapsed(ms) {
  const s=Math.floor(ms/1000), m=Math.floor(s/60), h=Math.floor(m/60);
  return h>0?`${h}:${String(m%60).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`:`${m}:${String(s%60).padStart(2,'0')}`;
}
function sessVolume(sess) {
  return (sess?.exercises||[]).reduce((t,ex)=>
    t+(ex.sets||[]).reduce((s,set)=>s+(set.done&&set.kg>0?set.reps*set.kg:0),0),0);
}
function sessDone(sess) {
  return (sess?.exercises||[]).reduce((s,ex)=>s+(ex.sets||[]).filter(x=>x.done).length,0);
}
function sessTotal(sess) {
  return (sess?.exercises||[]).reduce((s,ex)=>s+(ex.sets||[]).length,0);
}
function calcStreak(sessions) {
  const done = new Set(sessions.filter(s=>s.completedAt).map(s=>s.date));
  let streak=0, d=new Date();
  while(done.has(d.toISOString().slice(0,10))) { streak++; d.setDate(d.getDate()-1); }
  return streak;
}
function calcTotalVolume(sessions) {
  return sessions.reduce((t,s)=>t+sessVolume(s),0);
}
function calcTotalSets(sessions) {
  return sessions.filter(s=>s.completedAt).reduce((t,s)=>t+sessDone(s),0);
}
function calcPRs(sessions) {
  const prs = {};
  for (const sess of sessions) {
    for (const ex of (sess.exercises||[])) {
      for (const set of (ex.sets||[])) {
        if (!set.done||!set.kg||!set.reps) continue;
        const e1rm = set.kg*(1+set.reps/30);
        if (!prs[ex.name]||e1rm>prs[ex.name].e1rm) {
          prs[ex.name] = { kg:set.kg, reps:set.reps, e1rm, date:sess.date };
        }
      }
    }
  }
  return prs;
}
function checkAchievements(sessions) {
  const unlock = new Set();
  const streak = calcStreak(sessions);
  const vol = calcTotalVolume(sessions);
  const sets = calcTotalSets(sessions);
  const prs = calcPRs(sessions);
  if (sessions.some(s=>s.completedAt)) unlock.add('first');
  if (streak>=5) unlock.add('streak5');
  if (streak>=10) unlock.add('streak10');
  if (vol>=100000) unlock.add('vol100');
  if (sets>=100) unlock.add('sets100');
  if (sets>=500) unlock.add('sets500');
  if (prs['Panca piana']) unlock.add('pr_bench');
  if (prs['Squat bilanciere']) unlock.add('pr_squat');
  return unlock;
}

// ─── BACKUP ───────────────────────────────────────────────────────────
const SNOOZE_KEY = 'reps_backup_snooze';

function needsBackup(lastBackup) {
  const snooze = localStorage.getItem(SNOOZE_KEY);
  if (snooze && Date.now() < Number(snooze)) return false;
  if (!lastBackup) return true;
  return Date.now() - new Date(lastBackup).getTime() > 7 * 24 * 3600 * 1000;
}

function doBackup(state, update) {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const stamp = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  const filename = `reps-backup-${stamp}.json`;
  const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  update(s => ({ ...s, lastBackup: now.toISOString() }));
  localStorage.removeItem(SNOOZE_KEY);
}

function BackupBanner({ state, update, T }) {
  const [visible, setVisible] = React.useState(() => needsBackup(state.lastBackup));
  if (!visible) return null;
  const snooze = () => {
    localStorage.setItem(SNOOZE_KEY, String(Date.now() + 24*3600*1000));
    setVisible(false);
  };
  const backup = () => {
    doBackup(state, update);
    setVisible(false);
  };
  return (
    <div style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 12px', background:T.card2, borderTop:`1px solid ${T.rule}`, flexShrink:0 }}>
      <div style={{ flex:1, display:'flex', alignItems:'center', gap:6 }}>
        <span style={{ fontSize:14 }}>💾</span>
        <div>
          <div style={{ fontFamily:T.display, fontSize:12, fontWeight:700, color:T.ink }}>Backup settimanale disponibile</div>
          <div style={{ fontFamily:T.mono, fontSize:9, color:T.ink2, letterSpacing:.5 }}>
            {state.lastBackup ? `Ultimo: ${new Date(state.lastBackup).toLocaleDateString('it-IT')}` : 'Nessun backup effettuato'}
          </div>
        </div>
      </div>
      <button onClick={backup} style={{ padding:'6px 14px', borderRadius:100, background:T.hi, border:'none', color:T.hiInk, fontFamily:T.display, fontWeight:700, fontSize:11, cursor:'pointer', flexShrink:0 }}>
        Scarica →
      </button>
      <button onClick={snooze} style={{ width:24, height:24, borderRadius:100, background:'transparent', border:'none', color:T.ink2, fontSize:16, cursor:'pointer', flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
        ×
      </button>
    </div>
  );
}

// ─── ONBOARDING ───────────────────────────────────────────────────────
function Onboarding({ state, update }) {
  const [step, setStep] = React.useState(0);
  const [draft, setDraft] = React.useState({ ...state.profile });
  const T = mkTheme('dark', '#c5f24a');
  const STEPS = 5;
  const bmi = (() => { const h=draft.height/100; return h?(draft.weight/(h*h)).toFixed(1):0; })();
  const bmiLabel = bmi<18.5?'sottopeso':bmi<25?'normopeso':bmi<30?'sovrappeso':'obeso';

  const next = () => {
    if (step < STEPS-1) setStep(s=>s+1);
    else update(s=>({ ...s, profile:draft, setup:true }));
  };
  const back = () => step>0&&setStep(s=>s-1);

  return (
    <AppFrame T={T}>
      <Scr T={T} style={{ paddingBottom:0 }}>
        <div style={{ padding:'14px 16px 0', display:'flex', gap:5 }}>
          {Array.from({length:STEPS}).map((_,i)=>(
            <div key={i} style={{ flex:1, height:3, borderRadius:2, background:i<=step?T.hi:T.rule }}/>
          ))}
        </div>
        <div style={{ padding:'10px 22px 6px', display:'flex', justifyContent:'space-between' }}>
          <ML T={T}>{String(step+1).padStart(2,'0')} / 0{STEPS}</ML>
          {step>0&&<ML T={T} c={T.hi} style={{ cursor:'pointer' }} onClick={next}>SALTA →</ML>}
        </div>
        {step===0&&<OnbWelcome draft={draft} setDraft={setDraft} T={T}/>}
        {step===1&&<OnbSex draft={draft} setDraft={setDraft} T={T}/>}
        {step===2&&<OnbAge draft={draft} setDraft={setDraft} T={T}/>}
        {step===3&&<OnbBody draft={draft} setDraft={setDraft} bmi={bmi} bmiLabel={bmiLabel} T={T}/>}
        {step===4&&<OnbGoal draft={draft} setDraft={setDraft} T={T}/>}
      </Scr>
      <div style={{ padding:'12px 14px calc(14px + env(safe-area-inset-bottom))', display:'flex', gap:8, background:T.bg, borderTop:`1px solid ${T.rule}`, flexShrink:0 }}>
        {step>0&&<GBtn onClick={back} T={T} style={{ width:'auto', padding:'12px 18px' }}>← Indietro</GBtn>}
        <PBtn onClick={next} T={T} style={{ flex:1 }}>
          {step===STEPS-1?'INIZIA AD ALLENARTI':'CONTINUA'}{I.arr(T.hiInk,14)}
        </PBtn>
      </div>
    </AppFrame>
  );
}

// ─── HOME SCREEN ──────────────────────────────────────────────────────
function HomeScreen({ state, update, T, onStartWorkout }) {
  const profile = state.profile;
  const kind = state.schedule[new Date().getDay()];
  const tmpl = kind ? (state.programs?.[kind] || TEMPLATES[kind]) : null;
  const active = state.sessions.find(s=>s.id===state.activeSessionId);
  const completedSessions = state.sessions.filter(s=>s.completedAt);
  const streak = calcStreak(completedSessions);
  const totalVol = calcTotalVolume(completedSessions);

  // weekly volume bars (last 7 days)
  const weekVols = React.useMemo(() => {
    const today = new Date(), bars = [];
    for (let i=6; i>=0; i--) {
      const d = new Date(today); d.setDate(d.getDate()-i);
      const ds = d.toISOString().slice(0,10);
      const vol = completedSessions.filter(s=>s.date===ds).reduce((t,s)=>t+sessVolume(s),0);
      bars.push({ day:['L','M','M','G','V','S','D'][(d.getDay()+6)%7], vol, isToday:i===0 });
    }
    const max = Math.max(...bars.map(b=>b.vol),1);
    return bars.map(b=>({ ...b, pct:b.vol/max }));
  }, [completedSessions]);

  return (
    <Scr T={T} style={{ paddingBottom:16 }}>
      {/* header */}
      <div style={{ padding:'16px 18px 4px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div>
          <ML T={T}>WK {Math.ceil(new Date().getDate()/7)} · {dayName(new Date()).toUpperCase()}</ML>
          <DL T={T} size={24} style={{ marginTop:5 }}>
            {profile.name||'Atleta'}<span style={{ color:T.hi }}>.</span>
          </DL>
        </div>
        <div style={{ display:'flex', gap:8, alignItems:'center' }}>
          {streak>0&&(
            <div style={{ display:'flex', alignItems:'center', gap:4, padding:'6px 10px', background:T.card, borderRadius:8 }}>
              {I.flame(T.hi,16)}
              <span style={{ fontFamily:T.mono, fontSize:12, color:T.hi, fontWeight:600 }}>{streak}</span>
            </div>
          )}
          <div style={{ width:34, height:34, borderRadius:8, background:T.card, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:T.mono, fontSize:13, color:T.ink, fontWeight:600 }}>
            {(profile.name||'A')[0].toUpperCase()}
          </div>
        </div>
      </div>

      {/* active session banner */}
      {active&&(
        <div onClick={()=>onStartWorkout(active.kind,active.id)} style={{ margin:'10px 14px 0', padding:'12px 14px', background:T.hi, borderRadius:12, display:'flex', alignItems:'center', justifyContent:'space-between', cursor:'pointer' }}>
          <div>
            <ML T={T} c={T.hiInk} ls={1}>Allenamento in corso</ML>
            <div style={{ fontFamily:T.display, fontSize:15, fontWeight:700, color:T.hiInk, marginTop:2 }}>
              {(state.programs?.[active.kind]||TEMPLATES[active.kind])?.name||active.kind} · {sessDone(active)}/{sessTotal(active)} serie
            </div>
          </div>
          {I.arr(T.hiInk,18)}
        </div>
      )}

      {/* today's workout card */}
      {!active&&(
        <div style={{ margin:'12px 14px 0', borderRadius:16, background:T.card, padding:'16px 16px 14px', position:'relative', overflow:'hidden' }}>
          <div style={{ position:'absolute', top:0, right:0, padding:'5px 12px', background:T.hi, color:T.hiInk, fontFamily:T.mono, fontSize:9, letterSpacing:1.5, borderBottomLeftRadius:12, fontWeight:700 }}>
            {tmpl?`OGGI · ${tmpl.name.toUpperCase()}`:'OGGI · RIPOSO'}
          </div>
          {tmpl?(
            <>
              <ML T={T}>Scheda programmata</ML>
              <DL T={T} size={26} style={{ marginTop:6 }}>{tmpl.name}</DL>
              <div style={{ fontSize:12, color:T.ink2, marginTop:2 }}>{tmpl.sub}</div>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8, marginTop:14 }}>
                {[['EX',tmpl.exercises.length],['SERIE',tmpl.exercises.reduce((s,e)=>s+e.targetSets,0)],['MIN','~'+(tmpl.exercises.length*8)]].map(([k,v])=>(
                  <div key={k} style={{ background:T.bg, borderRadius:10, padding:'8px 10px' }}>
                    <ML T={T} size={9}>{ k}</ML>
                    <div style={{ fontFamily:T.mono, fontSize:18, color:T.ink, marginTop:2 }}>{v}</div>
                  </div>
                ))}
              </div>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:14, paddingTop:12, borderTop:`1px solid ${T.rule}` }}>
                <ML T={T}>↳ Tap per iniziare</ML>
                <div onClick={()=>onStartWorkout(kind,null)} style={{ display:'flex', alignItems:'center', gap:8, padding:'9px 16px', background:T.hi, color:T.hiInk, borderRadius:100, cursor:'pointer', WebkitTapHighlightColor:'transparent' }}>
                  <span style={{ fontFamily:T.display, fontWeight:800, fontSize:13, letterSpacing:.5 }}>INIZIA</span>
                  {I.arr(T.hiInk,14)}
                </div>
              </div>
            </>
          ):(
            <>
              <ML T={T}>Nessun allenamento oggi</ML>
              <DL T={T} size={22} style={{ marginTop:6, color:T.ink2 }}>Giorno di riposo</DL>
              <div style={{ marginTop:14, paddingTop:12, borderTop:`1px solid ${T.rule}` }}>
                <div style={{ display:'flex', gap:8 }}>
                  {Object.keys(state.programs||TEMPLATES).map(k=>(
                    <div key={k} onClick={()=>onStartWorkout(k,null)} style={{ flex:1, padding:'8px 4px', background:T.bg, borderRadius:8, textAlign:'center', cursor:'pointer', WebkitTapHighlightColor:'transparent' }}>
                      <div style={{ fontFamily:T.mono, fontSize:10, color:T.ink2 }}>{(state.programs?.[k]||TEMPLATES[k]).name}</div>
                    </div>
                  ))}

            </>

      )}

      {/* metrics */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, padding:'12px 14px 0' }}>
        {[
          ['PESO',`${profile.weight} kg`,'biometria'],
          ['STREAK',`${streak}d`,streak>0?'🔥':'–'],
          ['VOL TOTALE',totalVol>999?`${(totalVol/1000).toFixed(1)}t`:`${totalVol}kg`,'accum.'],
          ['SESSION',completedSessions.length,`allenamenti`],
        ].map(([k,v,d],i)=>(
          <Card T={T} pad="10px 12px" key={i}>
            <div style={{ display:'flex', justifyContent:'space-between' }}>
              <ML T={T} size={9}>{k}</ML>
              <ML T={T} size={9} c={T.ink2}>{d}</ML>
            </div>
            <div style={{ fontFamily:T.mono, fontSize:20, marginTop:4, color:T.ink }}>{v}</div>
          </Card>
        ))}
      </div>

      {/* weekly bar chart */}
      <Card T={T} pad="12px 14px" style={{ margin:'10px 14px 0' }}>
        <div style={{ display:'flex', justifyContent:'space-between' }}>
          <ML T={T} size={9}>QUESTA SETTIMANA · VOLUME (kg)</ML>
        </div>
        <div style={{ display:'flex', alignItems:'flex-end', gap:5, height:50, marginTop:8 }}>
          {weekVols.map((b,i)=>(
            <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:3 }}>
              <div style={{ width:'100%', height:`${Math.max(4,b.pct*100)}%`, background:b.isToday?T.hi:b.vol>0?T.card2:T.rule, borderRadius:3, minHeight:b.vol>0?8:3 }}/>
              <span style={{ fontFamily:T.mono, fontSize:8, color:b.isToday?T.hi:T.ink2 }}>{b.day}</span>
            </div>
          ))}
        </div>
      </Card>
    </Scr>
  );
}

// ─── WORKOUT SCREEN ───────────────────────────────────────────────────
function WorkoutScreen({ sessionId, kind, sessions, update, T, onClose, programs }) {
  const [page, setPage] = React.useState('list'); // list | exercise | rest | complete | video | warmup
  const [exIdx, setExIdx] = React.useState(0);
  const [restSec, setRestSec] = React.useState(90);
  const [restLeft, setRestLeft] = React.useState(90);
  const timerRef = React.useRef(null);

  const sess = sessions.find(s=>s.id===sessionId);
  if (!sess) return null;

  // ensure session has a valid id in state
  const updateSess = (fn) => {
    update(s=>({ ...s, sessions:s.sessions.map(ss=>ss.id===sessionId?fn(ss):ss) }));
  };

  // start rest timer
  const startRest = (sec=90) => {
    setRestSec(sec); setRestLeft(sec); setPage('rest');
  };
  React.useEffect(()=>{
    if (page==='rest') {
      timerRef.current = setInterval(()=>{
        setRestLeft(l=>{ if(l<=1){ clearInterval(timerRef.current); setPage('exercise'); return 0; } return l-1; });
      },1000);
    } else { clearInterval(timerRef.current); }
    return ()=>clearInterval(timerRef.current);
  },[page]);

  const completeWorkout = () => {
    updateSess(s=>({ ...s, completedAt:new Date().toISOString() }));
    update(s=>({ ...s, activeSessionId:null }));
    setPage('complete');
  };

  const allDone = sess.exercises.every(ex=>(ex.sets||[]).every(set=>set.done));

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%', background:T.bg }}>
      {page==='list'&&<ExerciseList sess={sess} T={T} programs={programs} onSelect={i=>{setExIdx(i);setPage('exercise');}} onClose={()=>{update(s=>({...s,activeSessionId:null}));onClose();}} onComplete={completeWorkout} allDone={allDone} onWarmup={()=>setPage('warmup')}/>}
      {page==='exercise'&&<ExerciseView sess={sess} exIdx={exIdx} updateSess={updateSess} T={T} sessions={sessions} onBack={()=>setPage('list')} onRest={startRest} onVideo={()=>setPage('video')} onNext={()=>{if(exIdx<sess.exercises.length-1){setExIdx(i=>i+1);}else setPage('list');}}/>}
      {page==='rest'&&<RestTimer left={restLeft} total={restSec} T={T} onSkip={()=>{clearInterval(timerRef.current);setPage('exercise');}} onAdd={()=>setRestLeft(l=>l+15)}/>}
      {page==='complete'&&<WorkoutComplete sess={sess} T={T} programs={programs} onClose={onClose}/>}
      {page==='video'&&<VideoModal exName={sess.exercises[exIdx]?.name||''} T={T} onClose={()=>setPage('exercise')}/>}
      {page==='warmup'&&<WarmupScreen kind={sess.kind} T={T} onClose={()=>setPage('list')}/>}
    </div>
  );
}

function ExerciseList({ sess, T, programs, onSelect, onClose, onComplete, allDone, onWarmup }) {
  const tmpl = (programs&&programs[sess.kind]) || TEMPLATES[sess.kind];
  const [elapsed, setElapsed] = React.useState(0);
  React.useEffect(() => {
    const start = sess.startedAt ? new Date(sess.startedAt).getTime() : Date.now();
    setElapsed(Date.now() - start);
    const timer = setInterval(() => setElapsed(Date.now() - start), 1000);
    return () => clearInterval(timer);
  }, [sess.startedAt]);

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
      <div style={{ padding:'calc(env(safe-area-inset-top) + 12px) 16px 12px', display:'flex', justifyContent:'space-between', alignItems:'center', borderBottom:`1px solid ${T.rule}`, flexShrink:0 }}>
        <div>
          <ML T={T} c={T.hi}>{tmpl?.name||sess.kind} <span style={{ color:T.ink2 }}>· {fmtElapsed(elapsed)}</span></ML>
          <DL T={T} size={18} style={{ marginTop:3 }}>{tmpl?.sub||''}</DL>
        </div>
        <div style={{ display:'flex', gap:8 }}>
          <button onClick={onWarmup} style={{ padding:'6px 10px', borderRadius:8, background:T.card2, border:'none', color:T.ink2, fontFamily:T.mono, fontSize:10, cursor:'pointer' }}>WARM-UP</button>
          <button onClick={onClose} style={{ width:32, height:32, borderRadius:8, background:T.card, border:'none', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>{I.close(T.ink,16)}</button>
        </div>
      </div>

      <div style={{ flex:1, overflowY:'auto', padding:'10px 12px' }}>
        {sess.exercises.map((ex,i)=>{
          const done = (ex.sets||[]).filter(s=>s.done).length;
          const total = (ex.sets||[]).length;
          const pct = total?done/total:0;
          return (
            <div key={i} onClick={()=>onSelect(i)} style={{ display:'flex', alignItems:'center', gap:12, padding:'12px 14px', borderRadius:12, background:T.card, marginBottom:8, cursor:'pointer', WebkitTapHighlightColor:'transparent' }}>
              <div style={{ width:36, height:36, borderRadius:9, background:T.card2, display:'flex', alignItems:'center', justifyContent:'center', position:'relative' }}>
                <svg viewBox="0 0 36 36" width="36" height="36" style={{ position:'absolute', inset:0 }}>
                  <circle cx="18" cy="18" r="15" fill="none" stroke={T.rule} strokeWidth="2.5"/>
                  <circle cx="18" cy="18" r="15" fill="none" stroke={T.hi} strokeWidth="2.5"
                    strokeDasharray={`${pct*94.2} 94.2`} strokeLinecap="round" transform="rotate(-90 18 18)"/>
                </svg>
                <span style={{ fontFamily:T.mono, fontSize:10, color:pct===1?T.hi:T.ink2, zIndex:1 }}>{i+1}</span>
              </div>
              <div style={{ flex:1 }}>
                <div style={{ fontFamily:T.display, fontSize:14, fontWeight:600, color:pct===1?T.ink2:T.ink }}>{ex.name}</div>
                <ML T={T} size={9} c={T.ink2}>{done}/{total} serie{ex.bw?' · BW':''}</ML>
              </div>
              {I.arr(pct===1?T.ink2:T.ink2,14)}
            </div>
          );
        })}
      </div>

      <div style={{ padding:'10px 14px calc(14px + env(safe-area-inset-bottom))', borderTop:`1px solid ${T.rule}`, flexShrink:0 }}>
        <PBtn onClick={onComplete} T={T} style={{ background:allDone?T.hi:T.card, color:allDone?T.hiInk:T.ink2 }}>
          {allDone?'COMPLETA ALLENAMENTO ✓':'TERMINA IN ANTICIPO'}
          {allDone&&I.check(T.hiInk,16)}
        </PBtn>
      </div>
    </div>
  );
}

function ExerciseView({ sess, exIdx, updateSess, T, sessions, onBack, onRest, onVideo, onNext }) {
  const ex = sess.exercises[exIdx];
  if (!ex) return null;
  const sets = ex.sets||[];
  const activeIdx = sets.findIndex(s=>!s.done);
  const [note, setNote] = React.useState('');
  const [showNote, setShowNote] = React.useState(false);

  // last session data for this exercise
  const lastData = React.useMemo(() => {
    if (!sessions) return null;
    const prev = [...sessions]
      .filter(s => s.completedAt && s.id !== sess.id && s.kind === sess.kind)
      .sort((a,b) => new Date(b.completedAt) - new Date(a.completedAt));
    for (const s of prev) {
      const e = (s.exercises||[]).find(e => e.name === ex.name);
      if (e) return { sets: (e.sets||[]).filter(s=>s.done), date: s.date, allDone: (e.sets||[]).every(s=>s.done) };
    }
    return null;
  }, [sessions, sess.id, sess.kind, ex.name]);

  // progressive overload suggestion: +2.5 kg if last session all sets done
  const suggestion = React.useMemo(() => {
    if (!lastData || !lastData.allDone || lastData.sets.length === 0) return null;
    const maxKg = Math.max(...lastData.sets.map(s => s.kg));
    if (maxKg <= 0) return null; // bodyweight
    return { kg: +(maxKg + 2.5).toFixed(1) };
  }, [lastData]);

  const applySuggestion = () => {
    if (!suggestion) return;
    updateSess(s => ({
      ...s,
      exercises: s.exercises.map((e,ei) => ei !== exIdx ? e : {
        ...e,
        sets: e.sets.map(set => set.done ? set : { ...set, kg: suggestion.kg }),
      }),
    }));
  };

  const logSet = (si, reps, kg) => {
    updateSess(s=>{
      const exs = s.exercises.map((e,ei)=>{
        if(ei!==exIdx) return e;
        return { ...e, sets:e.sets.map((set,i)=>i===si?{...set,done:true,reps,kg}:set) };
      });
      return { ...s, exercises:exs };
    });
    onRest(90);
  };

  const addSet = () => {
    updateSess(s=>{
      const exs = s.exercises.map((e,ei)=>{
        if(ei!==exIdx) return e;
        const last = e.sets.length?e.sets[e.sets.length-1]:{};
        return { ...e, sets:[...e.sets, { id:uid(), reps:last.reps||10, kg:last.kg||0, done:false }] };
      });
      return { ...s, exercises:exs };
    });
  };

  const doneSets = sets.filter(s=>s.done);

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
      {/* header */}
      <div style={{ padding:'calc(env(safe-area-inset-top)+10px) 16px 10px', display:'flex', justifyContent:'space-between', alignItems:'center', flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:8, cursor:'pointer', WebkitTapHighlightColor:'transparent' }} onClick={onBack}>
          {I.back(T.ink,18)}<ML T={T}>EX {exIdx+1} / {sess.exercises.length}</ML>
        </div>
        {onVideo&&<div onClick={onVideo} style={{ display:'flex', alignItems:'center', gap:4, padding:'5px 10px', background:T.card, borderRadius:100, cursor:'pointer' }}>
          {I.play(T.hi,12)}<ML T={T} c={T.hi} size={9} ls={1}>VIDEO</ML>
        </div>}
      </div>

      <div style={{ flex:1, overflowY:'auto', padding:'0 14px 8px' }}>
        <ML T={T} c={T.hi} ls={1} size={10}>{ex.name.toUpperCase()}{ex.bw?' · CORPO LIBERO':''}</ML>
        <DL T={T} size={24} style={{ marginTop:4 }}>{ex.name}</DL>

        {/* last session chip */}
        {lastData && lastData.sets.length > 0 && (
          <div style={{ display:'flex', alignItems:'center', gap:8, marginTop:8, flexWrap:'wrap' }}>
            <ML T={T} size={9} c={T.ink2}>ULTIMA VOLTA · {fmtDateShort(lastData.date).toUpperCase()}</ML>
            <div style={{ display:'flex', gap:5, flexWrap:'wrap' }}>
              {lastData.sets.slice(0,5).map((s,i)=>(
                <span key={i} style={{ fontFamily:T.mono, fontSize:10, color:T.ink2, background:T.card2, padding:'2px 6px', borderRadius:4 }}>
                  {s.reps}×{s.kg>0?s.kg+'kg':'BW'}
                </span>
              ))}
            </div>
          </div>
        )}

        {/* progressive overload suggestion */}
        {suggestion && (
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:8, padding:'8px 12px', background:T.card, borderRadius:10, border:`1px solid ${T.hi}44` }}>
            <div>
              <ML T={T} size={9} c={T.hi} ls={1}>PROGRESSIONE SUGGERITA</ML>
              <div style={{ fontFamily:T.display, fontSize:13, fontWeight:700, marginTop:2, color:T.ink }}>
                Prova <span style={{ color:T.hi }}>{suggestion.kg} kg</span> oggi
              </div>
            </div>
            <button onClick={applySuggestion} style={{ padding:'7px 14px', borderRadius:8, background:T.hi, border:'none', color:T.hiInk, fontFamily:T.mono, fontSize:10, fontWeight:700, cursor:'pointer', letterSpacing:.5 }}>
              APPLICA
            </button>
          </div>
        )}

        {/* progress bar */}
        <div style={{ display:'flex', gap:3, marginTop:12 }}>
          {sets.map((s,i)=>(
            <div key={i} style={{ flex:1, height:4, borderRadius:2, background:s.done?T.hi:i===activeIdx?T.card2:T.rule }}/>
          ))}
        </div>

        {/* sets table */}
        <div style={{ marginTop:12 }}>
          <div style={{ display:'grid', gridTemplateColumns:'28px 1fr 1fr 44px', gap:6, padding:'0 4px 6px' }}>
            <ML T={T} size={9}>#</ML>
            <ML T={T} size={9}>REPS</ML>
            <ML T={T} size={9}>KG</ML>
            <span/>
          </div>
          {sets.map((s,i)=>(
            <SetRow key={i} set={s} idx={i} active={i===activeIdx} done={s.done} T={T}
              onLog={(r,k)=>logSet(i,r,k)}/>
          ))}
          <button onClick={addSet} style={{ width:'100%', padding:'10px', marginTop:6, borderRadius:10, background:'transparent', border:`1px dashed ${T.rule}`, color:T.ink2, fontFamily:T.mono, fontSize:11, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>
            {I.plus(T.ink2,14)} AGGIUNGI SERIE
          </button>
        </div>

        {/* note */}
        <div style={{ marginTop:12 }}>
          <div onClick={()=>setShowNote(!showNote)} style={{ display:'flex', alignItems:'center', gap:6, cursor:'pointer' }}>
            <ML T={T} size={9} c={T.ink2}>NOTE</ML>
            <ML T={T} size={9} c={T.hi}>{showNote?'▲':'▼'}</ML>
          </div>
          {showNote&&(
            <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Forma, sensazioni, note..." rows={3}
              style={{ width:'100%', marginTop:6, padding:'10px 12px', background:T.card, border:`1px solid ${T.rule}`, borderLeft:`2px solid ${T.hi}`, borderRadius:10, color:T.ink, fontSize:13, lineHeight:1.5, outline:'none' }}/>
          )}
        </div>
      </div>

      <div style={{ padding:'8px 14px calc(12px + env(safe-area-inset-bottom))', borderTop:`1px solid ${T.rule}`, flexShrink:0, display:'flex', gap:8 }}>
        <GBtn onClick={onBack} T={T} style={{ width:'auto', padding:'12px 16px', flex:0 }}>← Lista</GBtn>
        <PBtn onClick={()=>{
          if(activeIdx>=0) { const s=sets[activeIdx]; logSet(activeIdx,s.reps,s.kg); }
          else onNext();
        }} T={T} style={{ flex:1 }}>
          {activeIdx>=0?`LOG SET ${activeIdx+1} →`:'PROSSIMO EX →'}
          {I.check(T.hiInk,16)}
        </PBtn>
      </div>
    </div>
  );
}

function SetRow({ set, idx, active, done, T, onLog }) {
  const [reps, setReps] = React.useState(set.reps||10);
  const [kg, setKg] = React.useState(set.kg||0);

  return (
    <div style={{ display:'grid', gridTemplateColumns:'28px 1fr 1fr 44px', gap:6, alignItems:'center', padding:'8px 6px', marginBottom:4, borderRadius:8, background:active?T.card2:'transparent', border:active?`1px solid ${T.hi}`:`1px solid ${T.rule}` }}>
      <span style={{ fontFamily:T.mono, fontSize:11, color:T.ink2 }}>{String(idx+1).padStart(2,'0')}</span>
      {done?(
        <>
          <span style={{ fontFamily:T.mono, fontSize:17, color:T.ink2 }}>{set.reps}</span>
          <span style={{ fontFamily:T.mono, fontSize:17, color:T.ink2 }}>{set.kg}</span>
          <div style={{ display:'flex', justifyContent:'center' }}>{I.check(T.hi,14)}</div>
        </>
      ):active?(
        <>
          <SetInput value={reps} onChange={setReps} step={1} T={T} accent/>
          <SetInput value={kg} onChange={setKg} step={2.5} T={T}/>
          <button onClick={()=>onLog(reps,kg)} style={{ height:32, borderRadius:8, background:T.hi, border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
            {I.check(T.hiInk,14)}
          </button>
        </>
      ):(
        <>
          <span style={{ fontFamily:T.mono, fontSize:15, color:T.ink3||T.ink2 }}>{set.reps}</span>
          <span style={{ fontFamily:T.mono, fontSize:15, color:T.ink3||T.ink2 }}>{set.kg}</span>
          <span style={{ fontFamily:T.mono, fontSize:10, color:T.ink2, textAlign:'center' }}>—</span>
        </>
      )}
    </div>
  );
}

function SetInput({ value, onChange, step, T, accent }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:2 }}>
      <div style={{ fontFamily:T.mono, fontSize:22, color:accent?T.hi:T.ink, fontWeight:600, lineHeight:1 }}>{value}</div>
      <div style={{ display:'flex', gap:2 }}>
        {[-step,+step].map(d=>(
          <button key={d} onClick={()=>onChange(v=>Math.max(0,+(v+d).toFixed(1)))} style={{ width:28, height:18, borderRadius:4, background:T.rule, border:'none', color:T.ink2, fontSize:10, fontFamily:T.mono, cursor:'pointer', WebkitTapHighlightColor:'transparent' }}>
            {d>0?'+':''}{d}
          </button>
        ))}
      </div>
    </div>
  );
}

function RestTimer({ left, total, T, onSkip, onAdd }) {
  const pct = left/total;
  const r = 90;
  const circ = 2*Math.PI*r;
  const mins = Math.floor(left/60), secs = left%60;

  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:24, background:T.bg }}>
      <ML T={T} c={T.hi} ls={2} size={11}>RECUPERO</ML>
      <div style={{ position:'relative', marginTop:20, marginBottom:20 }}>
        <svg width="220" height="220" viewBox="0 0 220 220">
          <circle cx="110" cy="110" r={r} fill="none" stroke={T.rule} strokeWidth="6"/>
          <circle cx="110" cy="110" r={r} fill="none" stroke={T.hi} strokeWidth="6"
            strokeDasharray={`${pct*circ} ${circ}`} strokeLinecap="round"
            transform="rotate(-90 110 110)" style={{ transition:'stroke-dasharray .9s linear' }}/>
        </svg>
        <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
          <div style={{ fontFamily:T.mono, fontSize:52, color:T.hi, lineHeight:1, fontWeight:600 }}>
            {mins}:{String(secs).padStart(2,'0')}
          </div>
          <ML T={T} c={T.ink2} size={10} ls={1}>secondi rimasti</ML>
        </div>
      </div>
      <div style={{ display:'flex', gap:10 }}>
        <button onClick={onAdd} style={{ padding:'10px 18px', borderRadius:100, background:T.card2, border:'none', color:T.ink, fontFamily:T.mono, fontSize:11, cursor:'pointer' }}>+15s</button>
        <button onClick={onSkip} style={{ padding:'10px 22px', borderRadius:100, background:T.hi, border:'none', color:T.hiInk, fontFamily:T.display, fontWeight:700, fontSize:13, cursor:'pointer', display:'flex', alignItems:'center', gap:6 }}>
          SALTA {I.skip(T.hiInk,14)}
        </button>
      </div>
      <div style={{ marginTop:16 }}>
        <ML T={T} c={T.ink2} size={10}>Prossima serie quando sei pronto</ML>
      </div>
    </div>
  );
}

function WarmupScreen({ kind, T, onClose }) {
  const exercises = WARMUP[kind] || WARMUP.total;
  const [current, setCurrent] = React.useState(0);
  const [timing, setTiming] = React.useState(false);
  const [sec, setSec] = React.useState(30);
  const timerRef = React.useRef(null);

  const startTimer = () => {
    setTiming(true); setSec(30);
    timerRef.current = setInterval(()=>{
      setSec(s=>{ if(s<=1){ clearInterval(timerRef.current); setTiming(false); setCurrent(c=>Math.min(c+1,exercises.length-1)); return 0; } return s-1; });
    },1000);
  };
  React.useEffect(()=>()=>clearInterval(timerRef.current),[]);

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%' }}>
      <div style={{ padding:'calc(env(safe-area-inset-top)+12px) 16px 12px', display:'flex', justifyContent:'space-between', alignItems:'center', borderBottom:`1px solid ${T.rule}`, flexShrink:0 }}>
        <div>
          <ML T={T} c={T.hi}>WARM-UP</ML>
          <DL T={T} size={18} style={{ marginTop:3 }}>{['push','pull','legs','total'][['push','pull','legs','total'].indexOf(kind)]?.toUpperCase()||kind.toUpperCase()}</DL>
        </div>
        <button onClick={onClose} style={{ width:32, height:32, borderRadius:8, background:T.card, border:'none', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>{I.close(T.ink,16)}</button>
      </div>
      <Scr T={T} style={{ padding:'16px 14px' }}>
        {exercises.map((ex,i)=>(
          <div key={i} onClick={()=>setCurrent(i)} style={{ display:'flex', alignItems:'center', gap:12, padding:'12px 14px', borderRadius:12, background:i===current?T.card2:T.card, border:`1px solid ${i===current?T.hi:T.rule}`, marginBottom:8, cursor:'pointer' }}>
            <div style={{ width:28, height:28, borderRadius:100, background:i<current?T.hi:i===current?T.card:T.rule, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
              {i<current?I.check(T.hiInk,12):<span style={{ fontFamily:T.mono, fontSize:11, color:i===current?T.hi:T.ink2 }}>{i+1}</span>}
            </div>
            <span style={{ fontFamily:T.display, fontSize:14, fontWeight:600, color:i===current?T.hi:i<current?T.ink2:T.ink, flex:1 }}>{ex}</span>
            {i===current&&!timing&&<button onClick={(e)=>{e.stopPropagation();startTimer();}} style={{ padding:'5px 12px', borderRadius:100, background:T.hi, border:'none', color:T.hiInk, fontFamily:T.mono, fontSize:10, cursor:'pointer' }}>START</button>}
            {i===current&&timing&&<ML T={T} c={T.hi} size={14}>{sec}s</ML>}
          </div>
        ))}
      </Scr>
      <div style={{ padding:'10px 14px calc(14px + env(safe-area-inset-bottom))', borderTop:`1px solid ${T.rule}`, flexShrink:0 }}>
        <PBtn onClick={onClose} T={T}>INIZIA ALLENAMENTO {I.arr(T.hiInk,16)}</PBtn>
      </div>
    </div>
  );
}

function WorkoutComplete({ sess, T, programs, onClose }) {
  const vol = sessVolume(sess);
  const done = sessDone(sess);
  const dur = sess.completedAt&&sess.startedAt ? Math.floor((new Date(sess.completedAt)-new Date(sess.startedAt))/1000) : 0;
  const tmpl = (programs&&programs[sess.kind]) || TEMPLATES[sess.kind];

  // confetti pieces
  const confetti = React.useMemo(()=>Array.from({length:20},(_,i)=>({
    x: Math.random()*100, delay:Math.random()*.8, dur:1.5+Math.random(), color:[T.hi,'#ff7a3d','#5fb8ff','#ffffff'][i%4],
    size: 6+Math.random()*6,
  })),[]);

  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', padding:'40px 24px 24px', background:T.bg, position:'relative', overflow:'hidden' }}>
      {confetti.map((c,i)=>(
        <div key={i} style={{ position:'absolute', top:0, left:`${c.x}%`, width:c.size, height:c.size, background:c.color, borderRadius:c.size/2, animation:`confettiFall ${c.dur}s ${c.delay}s ease-in both` }}/>
      ))}
      <div style={{ fontSize:60, marginBottom:8 }}>🏆</div>
      <ML T={T} c={T.hi} ls={2}>ALLENAMENTO COMPLETATO</ML>
      <DL T={T} size={28} style={{ textAlign:'center', marginTop:10 }}>
        {tmpl?.name||sess.kind}
      </DL>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10, marginTop:24, width:'100%' }}>
        {[['DURATA',dur?fmtElapsed(dur*1000):'—'],['SERIE',done],['VOLUME',vol>999?`${(vol/1000).toFixed(1)}t`:`${vol}kg`]].map(([k,v])=>(
          <Card T={T} pad="12px 10px" key={k}>
            <ML T={T} size={9}>{k}</ML>

      </div>
      <div style={{ width:'100%', marginTop:18 }}>

            <div key={i} style={{ display:'flex', justifyContent:'space-between', padding:'8px 0', borderBottom:`1px solid ${T.rule}` }}>
              <span style={{ fontSize:13, color:T.ink }}>{ex.name}</span>
              <ML T={T} size={10} c={T.ink2}>{done.length} serie · {Math.max(...done.map(s=>s.kg))} kg max</ML>
            </div>

      <PBtn onClick={onClose} T={T} style={{ marginTop:'auto', marginTop:24 }}>
        TORNA ALLA HOME {I.arr(T.hiInk,16)}
      </PBtn>
    </div>
  );
}

// ─── CALENDAR SCREEN ──────────────────────────────────────────────────
function CalendarScreen({ state, update, T, onStartWorkout, onEditProgram }) {
  const now = new Date();
  const [viewYear, setViewYear] = React.useState(now.getFullYear());
  const [viewMonth, setViewMonth] = React.useState(now.getMonth());
  const completedSessions = state.sessions.filter(s=>s.completedAt);
  const programs = state.programs || TEMPLATES;

  // build heatmap
  const heatmap = React.useMemo(()=>{
    const map = {};
    for (const sess of completedSessions) { map[sess.date]=(map[sess.date]||0)+sessVolume(sess); }
    return map;
  },[completedSessions]);

  const daysInMonth = new Date(viewYear,viewMonth+1,0).getDate();
  const firstDow = (new Date(viewYear,viewMonth,1).getDay()+6)%7; // Mon=0
  const cells = [];
  for(let i=0;i<firstDow;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);

  const today = todayStr();
  const maxVol = Math.max(...Object.values(heatmap),1);

  const intensityColor = (vol) => {
    if(!vol) return T.card;
    const pct = vol/maxVol;
    if(pct<.25) return T.mode==='dark'?'#3a4030':'#d0e0a0';
    if(pct<.5)  return T.mode==='dark'?'#6a8030':'#a0c040';
    if(pct<.8)  return T.mode==='dark'?'#9ab830':'#80a820';
    return T.hi;
  };

  // upcoming 7 days schedule
  const upcoming = [];
  for(let i=0;i<7;i++){
    const d=new Date(); d.setDate(d.getDate()+i);
    const dow=d.getDay();
    const kind=state.schedule[dow];
    if(kind) upcoming.push({ date:fmtDateShort(d), label:i===0?'OGGI':i===1?'DOMANI':`+${i}g`, kind, tmpl:programs[kind]||TEMPLATES[kind] });
  }

  const prevMonth=()=>{ if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1); };
  const nextMonth=()=>{ if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1); };

  return (
    <Scr T={T} style={{ paddingBottom:16 }}>
      <div style={{ padding:'16px 18px 0', display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
        <div>
          <ML T={T}>{viewYear}</ML>
          <DL T={T} size={26} style={{ marginTop:4 }}>{monthName(viewMonth)}<span style={{ color:T.hi }}>.</span></DL>
        </div>
        <div style={{ display:'flex', gap:6 }}>
          <button onClick={prevMonth} style={{ padding:'6px 12px', background:T.card, borderRadius:8, border:'none', color:T.ink, fontFamily:T.mono, fontSize:11, cursor:'pointer' }}>←</button>
          <button onClick={nextMonth} style={{ padding:'6px 12px', background:T.card, borderRadius:8, border:'none', color:T.ink, fontFamily:T.mono, fontSize:11, cursor:'pointer' }}>→</button>
        </div>
      </div>

      {/* heatmap grid */}
      <div style={{ padding:'14px 14px 0' }}>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:5, marginBottom:6 }}>
          {['L','M','M','G','V','S','D'].map((d,i)=>(
            <div key={i} style={{ textAlign:'center', fontFamily:T.mono, fontSize:9, color:T.ink2 }}>{d}</div>
          ))}
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:5 }}>
          {cells.map((d,i)=>{
            if(!d) return <div key={i}/>;
            const ds=`${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const vol=heatmap[ds]||0;
            const isToday=ds===today;
            return (
              <div key={i} style={{ aspectRatio:'1', borderRadius:6, background:intensityColor(vol), display:'flex', alignItems:'center', justifyContent:'center', outline:isToday?`2px solid ${T.hi}`:'none', outlineOffset:1 }}>
                <span style={{ fontFamily:T.mono, fontSize:9, color:vol>0?T.hiInk:(isToday?T.hi:T.ink2), fontWeight:600 }}>{d}</span>
              </div>
            );
          })}
        </div>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:10 }}>
          <ML T={T} size={9}>intensità volume</ML>
          <div style={{ display:'flex', gap:3 }}>
            {[T.card,'#3a4030','#9ab830',T.hi].map((c,i)=>(<div key={i} style={{ width:14, height:14, borderRadius:3, background:c }}/>))}
          </div>
        </div>
      </div>

      <div style={{ height:1, background:T.rule, margin:'14px 14px 0' }}/>

      {/* Schedule editor */}
      <div style={{ padding:'12px 14px 0', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <ML T={T} size={9}>SCHEDA SETTIMANALE</ML>
      </div>
      <div style={{ display:'flex', gap:5, padding:'8px 14px 0', overflowX:'auto' }}>
        {['L','M','M','G','V','S','D'].map((label,i)=>{
          const dow=(i+1)%7;
          const kind=state.schedule[dow];
          const prog=kind?(programs[kind]||TEMPLATES[kind]):null;
          return (
            <div key={i} style={{ flexShrink:0, width:42, display:'flex', flexDirection:'column', alignItems:'center', gap:4 }}>
              <ML T={T} size={9}>{label}</ML>
              <div onClick={()=>{
                const kinds=Object.keys(programs);
                const curr=kinds.indexOf(kind);
                const next=curr===-1?kinds[0]:(curr===kinds.length-1?null:kinds[curr+1]);
                update(s=>({...s,schedule:{...s.schedule,[dow]:next}}));
              }} style={{ width:42, height:42, borderRadius:10, background:kind?T.card2:T.card, border:`1px solid ${kind?T.hi:T.rule}`, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', WebkitTapHighlightColor:'transparent' }}>
                {kind?<ML T={T} size={9} c={T.hi}>{prog.name.slice(0,2)}</ML>:<ML T={T} size={9}>—</ML>}
              </div>
            </div>
          );
        })}
      </div>

      {/* Upcoming */}
      <div style={{ padding:'14px 14px 0' }}>
        <ML T={T} size={9}>PROSSIMI 7 GIORNI</ML>
        {upcoming.length===0&&<div style={{ padding:'20px 0', textAlign:'center', color:T.ink2, fontSize:13 }}>Nessun allenamento programmato</div>}
        {upcoming.map((u,i)=>(
          <div key={i} onClick={()=>onStartWorkout(u.kind,null)} style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 14px', marginTop:8, background:T.card, borderRadius:10, cursor:'pointer', WebkitTapHighlightColor:'transparent' }}>
            <div style={{ width:50 }}>
              <div style={{ fontFamily:T.mono, fontSize:10, color:T.ink }}>{u.date.split(' ').slice(0,2).join(' ')}</div>
              <ML T={T} size={9} c={u.label==='OGGI'?T.hi:T.ink2}>{u.label}</ML>
            </div>
            <div style={{ width:3, height:32, background:T.hi, borderRadius:2 }}/>
            <div style={{ flex:1 }}>
              <div style={{ fontFamily:T.display, fontSize:14, fontWeight:600 }}>{u.tmpl.name}</div>
              <ML T={T} size={9} c={T.ink2}>{u.tmpl.sub}</ML>
            </div>
            {I.arr(T.ink2,14)}
          </div>
        ))}
      </div>

      {/* Programs editor */}
      <div style={{ height:1, background:T.rule, margin:'14px 14px 0' }}/>
      <div style={{ padding:'12px 14px 0', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <ML T={T} size={9}>SCHEDE ALLENAMENTO</ML>
        <ML T={T} size={9} c={T.ink2}>tap per modificare</ML>
      </div>
      <div style={{ padding:'8px 14px 20px', display:'flex', flexDirection:'column', gap:8 }}>
        {Object.entries(programs).map(([key,prog])=>(
          <div key={key} style={{ display:'flex', alignItems:'center', padding:'12px 14px', background:T.card, borderRadius:12 }}>
            <div style={{ flex:1 }}>
              <div style={{ fontFamily:T.display, fontSize:14, fontWeight:700 }}>{prog.name}</div>
              <ML T={T} size={9} c={T.ink2}>{prog.sub} · {prog.exercises.length} esercizi</ML>
            </div>
            <button onClick={()=>onEditProgram(key)} style={{ padding:'7px 14px', borderRadius:8, background:T.card2, border:'none', color:T.ink, fontFamily:T.mono, fontSize:10, cursor:'pointer', display:'flex', alignItems:'center', gap:5 }}>
              {I.edit(T.ink,12)} MODIFICA
            </button>
          </div>
        ))}
      </div>
    </Scr>
  );
}

// ─── HISTORY CARD ─────────────────────────────────────────────────────

  const dur = sess.completedAt && sess.startedAt
    ? Math.floor((new Date(sess.completedAt) - new Date(sess.startedAt)) / 1000) : 0;

  return (
    <div style={{ background:T.card, borderRadius:12, marginBottom:8, overflow:'hidden' }}>

        <div style={{ width:6, height:6, borderRadius:6, background:T.hi, marginRight:10, flexShrink:0 }}/>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:'flex', alignItems:'baseline', gap:8 }}>
            <div style={{ fontFamily:T.display, fontSize:14, fontWeight:700 }}>{tmpl?.name||sess.kind}</div>
            <ML T={T} size={9} c={T.ink2}>{fmtDateShort(sess.date).toUpperCase()}</ML>
          </div>
          <div style={{ display:'flex', gap:10, marginTop:3 }}>
            <ML T={T} size={9} c={T.ink2}>{done} serie</ML>
            <ML T={T} size={9} c={T.ink2}>{vol>999?`${(vol/1000).toFixed(1)}t`:`${vol} kg`}</ML>
            {dur>0&&<ML T={T} size={9} c={T.ink2}>{fmtElapsed(dur*1000)}</ML>}
          </div>
        </div>
        <ML T={T} size={10} c={T.ink2}>{open?'▲':'▼'}</ML>
      </div>
      {open&&(
        <div style={{ borderTop:`1px solid ${T.rule}`, padding:'8px 14px 12px' }}>
          {(sess.exercises||[]).map((ex,i)=>{
            const dones=(ex.sets||[]).filter(s=>s.done);
            if(!dones.length) return null;
            return (
              <div key={i} style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', padding:'7px 0', borderBottom:`1px solid ${T.rule}` }}>
                <div style={{ fontFamily:T.display, fontSize:13, fontWeight:600, flex:1, paddingRight:8 }}>{ex.name}</div>
                <div style={{ display:'flex', gap:4, flexWrap:'wrap', justifyContent:'flex-end' }}>
                  {dones.map((s,j)=>(
                    <span key={j} style={{ fontFamily:T.mono, fontSize:10, color:T.ink2, background:T.bg, padding:'2px 6px', borderRadius:4 }}>
                      {s.reps}×{s.kg>0?s.kg+'kg':'BW'}
                    </span>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── STATS SCREEN ─────────────────────────────────────────────────────
function StatsScreen({ state, T }) {
  const completedSessions = state.sessions.filter(s=>s.completedAt);
  const allSessions = [...state.sessions].filter(s=>s.completedAt).reverse(); // newest first
  const programs = state.programs || TEMPLATES;
  const streak = calcStreak(completedSessions);
  const totalVol = calcTotalVolume(completedSessions);
  const totalSets = calcTotalSets(completedSessions);
  const prs = calcPRs(completedSessions);
  const unlocked = checkAchievements(completedSessions);
  const [tab, setTab] = React.useState('volume'); // volume | prs | streak | achievements | history

  // last 8 weeks volume
  const weekVols = React.useMemo(()=>{
    const weeks=[];
    for(let w=7;w>=0;w--){
      const start=new Date(); start.setDate(start.getDate()-w*7-6);
      const end=new Date(); end.setDate(end.getDate()-w*7);
      const vol=completedSessions.filter(s=>{
        const d=isoDate(s.date); return d>=start&&d<=end;
      }).reduce((t,s)=>t+sessVolume(s),0);
      weeks.push({ label:`W${8-w}`, vol });
    }
    const max=Math.max(...weeks.map(w=>w.vol),1);
    return weeks.map(w=>({...w,pct:w.vol/max}));
  },[completedSessions]);

  // 6-week streak heatmap
  const heatCells = React.useMemo(()=>{
    const done=new Set(completedSessions.map(s=>s.date));
    const cells=[];
    for(let i=41;i>=0;i--){
      const d=new Date(); d.setDate(d.getDate()-i);
      cells.push({ ds:d.toISOString().slice(0,10), done:done.has(d.toISOString().slice(0,10)) });
    }
    return cells;
  },[completedSessions]);

  return (
    <Scr T={T} style={{ paddingBottom:16 }}>
      <div style={{ padding:'16px 18px 8px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <DL T={T} size={26}>Performance<span style={{ color:T.hi }}>.</span></DL>
        <ML T={T} size={9} c={T.ink2}>{completedSessions.length} sessioni</ML>
      </div>

      {/* tab pills */}
      <div style={{ display:'flex', gap:6, padding:'0 14px 10px', overflowX:'auto' }}>
        {[['volume','Volume'],['prs','Record'],['streak','Streak'],['achievements','Badge'],['history','Storico']].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{ padding:'7px 14px', borderRadius:100, background:tab===k?T.hi:T.card, color:tab===k?T.hiInk:T.ink2, border:'none', cursor:'pointer', fontFamily:T.mono, fontSize:10, letterSpacing:.5, flexShrink:0, WebkitTapHighlightColor:'transparent' }}>{l}</button>
        ))}
      </div>

      {tab==='volume'&&(
        <div style={{ padding:'0 14px' }}>
          <Card T={T} pad="16px" style={{ marginBottom:10 }}>
            <ML T={T} size={9}>VOLUME TOTALE ACCUMULATO</ML>
            <div style={{ display:'flex', alignItems:'baseline', gap:6, marginTop:4 }}>
              <DL T={T} size={36} color={T.hi}>{totalVol>999?(totalVol/1000).toFixed(1):totalVol}</DL>
              <ML T={T} size={13}>{totalVol>999?'t':'kg'}</ML>
            </div>
            <div style={{ display:'flex', alignItems:'flex-end', gap:5, height:64, marginTop:14 }}>
              {weekVols.map((w,i)=>(
                <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:3 }}>
                  <div style={{ width:'100%', height:`${Math.max(4,w.pct*100)}%`, background:i===7?T.hi:T.card2, borderRadius:3, minHeight:4 }}/>
                  <ML T={T} size={8} c={i===7?T.hi:T.ink2}>{w.label}</ML>
                </div>
              ))}
            </div>
          </Card>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
            {[['SESSIONI',completedSessions.length,'totale'],['SERIE',totalSets,'completate'],['STREAK',`${streak}d`,streak>0?'🔥':'–'],['MEDIO',completedSessions.length?Math.round(totalVol/completedSessions.length)+'kg':'–','vol/sess']].map(([k,v,d])=>(
              <Card T={T} pad="12px" key={k}>
                <ML T={T} size={9}>{k}</ML>
                <div style={{ fontFamily:T.mono, fontSize:22, marginTop:4 }}>{v}</div>
                <ML T={T} size={9} c={T.ink2}>{d}</ML>
              </Card>
            ))}
          </div>
        </div>
      )}

      {tab==='prs'&&(
        <div style={{ padding:'0 14px' }}>
          {Object.keys(prs).length===0&&(
            <div style={{ textAlign:'center', padding:'40px 0', color:T.ink2 }}>
              <div style={{ fontSize:40, marginBottom:8 }}>🏋️</div>
              <div style={{ fontSize:14 }}>Completa alcuni allenamenti per vedere i tuoi record!</div>
            </div>
          )}
          {Object.entries(prs).map(([name,pr],i)=>(
            <div key={i} style={{ display:'flex', alignItems:'center', padding:'12px 14px', background:T.card, borderRadius:12, marginBottom:8 }}>
              <div style={{ flex:1 }}>
                <div style={{ fontFamily:T.display, fontSize:14, fontWeight:600 }}>{name}</div>
                <ML T={T} size={9} c={T.ink2}>{fmtDateShort(pr.date)}</ML>
              </div>
              <div style={{ textAlign:'right' }}>
                <div style={{ fontFamily:T.mono, fontSize:22, color:T.hi }}>{pr.kg} <span style={{ fontSize:12, color:T.ink2 }}>kg</span></div>
                <ML T={T} size={9} c={T.ink2}>×{pr.reps} · 1RM≈{Math.round(pr.e1rm)}kg</ML>
              </div>
            </div>
          ))}
        </div>
      )}

      {tab==='streak'&&(
        <div style={{ padding:'0 14px' }}>
          <Card T={T} pad="14px" style={{ marginBottom:12 }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
              <ML T={T} size={9}>STREAK ATTIVA</ML>
              <ML T={T} size={9} c={T.ink2}>6 settimane</ML>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:10, marginTop:8 }}>
              {I.flame(T.hi,24)}
              <DL T={T} size={48} color={T.hi} style={{ lineHeight:1 }}>{streak}</DL>
              <ML T={T} size={14}>giorni</ML>
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:3, marginTop:12 }}>
              {['L','M','M','G','V','S','D'].map((d,i)=><div key={i} style={{ textAlign:'center', fontFamily:T.mono, fontSize:8, color:T.ink2, marginBottom:2 }}>{d}</div>)}
              {heatCells.map((c,i)=>(
                <div key={i} style={{ aspectRatio:'1', borderRadius:4, background:c.done?T.hi:T.rule }}/>
              ))}
            </div>
          </Card>
          {completedSessions.length===0&&<div style={{ textAlign:'center', padding:'20px', color:T.ink2, fontSize:13 }}>Completa il tuo primo allenamento per iniziare la streak!</div>}
        </div>
      )}

      {tab==='achievements'&&(
        <div style={{ padding:'0 14px' }}>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
            {ACHIEVEMENTS.map(a=>{
              const on=unlocked.has(a.id);
              return (
                <Card T={T} pad="14px" key={a.id} accent={on} style={{ opacity:on?1:.5 }}>
                  <div style={{ fontSize:28 }}>{a.icon}</div>

        </div>
      )}
    </Scr>
  );
}

// ─── WEIGHT SPARKLINE ─────────────────────────────────────────────────
function WeightSparkline({ log, T }) {
  if (log.length < 2) return null;
  const sorted = [...log].sort((a,b)=>a.date.localeCompare(b.date)).slice(-12);
  const vals = sorted.map(e=>e.kg);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const W = 280, H = 52, pad = 6;
  const pts = sorted.map((e,i)=>{
    const x = pad + (i/(sorted.length-1))*(W-pad*2);
    const y = H - pad - ((e.kg-min)/range)*(H-pad*2);
    return `${x},${y}`;
  }).join(' ');
  const last = sorted[sorted.length-1];
  const first = sorted[0];
  const diff = +(last.kg - first.kg).toFixed(1);
  return (
    <div style={{ marginTop:12 }}>
      <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}>
        <ML T={T} size={9} c={T.ink2}>ULTIME {sorted.length} MISURAZIONI</ML>
        <ML T={T} size={9} c={diff<0?T.hi:diff>0?T.red:T.ink2}>{diff>0?'+':''}{diff} kg</ML>
      </div>
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ display:'block' }}>
        <polyline points={pts} fill="none" stroke={T.hi} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
        {sorted.map((e,i)=>{
          const x = pad + (i/(sorted.length-1))*(W-pad*2);
          const y = H - pad - ((e.kg-min)/range)*(H-pad*2);
          return <circle key={i} cx={x} cy={y} r="3" fill={i===sorted.length-1?T.hi:T.card2} stroke={T.hi} strokeWidth="1.5"/>;
        })}
      </svg>
      <div style={{ display:'flex', justifyContent:'space-between' }}>
        <ML T={T} size={8} c={T.ink2}>{first.date.slice(5)}</ML>
        <ML T={T} size={8} c={T.ink2}>{last.date.slice(5)}</ML>
      </div>
    </div>
  );
}

// ─── PROFILE SCREEN ───────────────────────────────────────────────────
function ProfileScreen({ state, update, T }) {
  const p = state.profile;
  const [editing, setEditing] = React.useState(false);
  const [draft, setDraft] = React.useState({ ...p });
  const weightLog = state.weightLog || [];
  const todayKg = weightLog.find(e=>e.date===todayStr())?.kg || p.weight;
  const [newKg, setNewKg] = React.useState(todayKg);

  const bmi = (() => { const h=p.height/100; return h?(p.weight/(h*h)).toFixed(1):0; })();

  const logWeight = () => {
    const entry = { date: todayStr(), kg: newKg };
    update(s => ({
      ...s,
      weightLog: [...(s.weightLog||[]).filter(e=>e.date!==todayStr()), entry],
      profile: { ...s.profile, weight: newKg },
    }));
  };

  const saveProfile = () => {
    update(s=>({ ...s, profile:draft }));
    setEditing(false);
  };

  const exportData = () => doBackup(state, update);

  const importData = () => {
    const inp = document.createElement('input');
    inp.type='file'; inp.accept='.json';
    inp.onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const parsed = JSON.parse(ev.target.result);
          if (!parsed.profile || !parsed.sessions) {
            alert('File non valido. Assicurati di usare un backup REPS.');
            return;
          }
          if (confirm(`Ripristinare i dati dal backup del ${new Date(parsed.lastBackup||parsed.sessions?.[0]?.date||Date.now()).toLocaleDateString('it-IT')}?\n\nI dati attuali verranno sostituiti.`)) {
            update(() => ({ ...parsed, lastBackup: parsed.lastBackup||null }));
            alert('Dati ripristinati con successo! ✓');
          }
        } catch {
          alert('Errore nella lettura del file. Assicurati che sia un JSON valido.');
        }
      };
      reader.readAsText(file);
    };
    inp.click();
  };

  const resetApp = () => {
    if (confirm('Sei sicuro? Tutti i dati verranno eliminati.')) {
      localStorage.removeItem(SK);
      window.location.reload();
    }
  };

  return (
    <Scr T={T} style={{ paddingBottom:24 }}>
      <div style={{ padding:'16px 18px 0', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <DL T={T} size={24}>{p.name||'Profilo'}<span style={{ color:T.hi }}>.</span></DL>

      <div style={{ margin:'12px 14px 0' }}>
        <Card T={T} accent={editing} pad="16px">
          <ML T={T} size={9} c={T.hi}>BIOMETRIA</ML>
          {editing?(
            <div style={{ marginTop:12 }}>
              {[{k:'nome',val:draft.name,set:v=>setDraft({...draft,name:v}),type:'text'},{k:'età',val:draft.age,set:v=>setDraft({...draft,age:+v}),type:'number'},{k:'peso kg',val:draft.weight,set:v=>setDraft({...draft,weight:+v}),type:'number'},{k:'altezza cm',val:draft.height,set:v=>setDraft({...draft,height:+v}),type:'number'}].map(f=>(

            <div style={{ display:'flex', gap:8 }}>
              <input value={custom} onChange={e=>setCustom(e.target.value)} placeholder="Es. Sissy squat..."
                style={{ flex:1, padding:'10px 12px', background:T.card, border:`1px solid ${T.rule}`, borderRadius:8, color:T.ink, fontSize:14, fontFamily:T.display, outline:'none' }}/>
              <button onClick={()=>{ if(custom.trim()){ onAdd({name:custom.trim(),bw:false}); setCustom(''); } }}
                style={{ padding:'10px 18px', background:T.hi, borderRadius:8, border:'none', color:T.hiInk, fontFamily:T.display, fontWeight:700, fontSize:13, cursor:'pointer' }}>
                Aggiungi
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────
function App() {
  const [state, update] = useAppState();
  const [tab, setTab] = React.useState('home');
  const [workout, setWorkout] = React.useState(null);   // { sessionId, kind } | null
  const [editProgKey, setEditProgKey] = React.useState(null); // 'push'|'pull'|'legs'|'fullbody'|null

  const T = mkTheme(state.prefs?.mode||'dark', state.prefs?.accent||'#c5f24a');
  const programs = state.programs || TEMPLATES;

  if (!state.setup) return <Onboarding state={state} update={update}/>;

  const startWorkout = (kind, existingId) => {
    if (existingId) {
      setWorkout({ sessionId:existingId, kind });
      return;
    }
    const tmpl = programs[kind] || TEMPLATES[kind];
    if (!tmpl) return;
    const id = uid();
    const session = {
      id, kind, date:todayStr(), startedAt:new Date().toISOString(), completedAt:null,
      exercises: tmpl.exercises.map(ex=>({
        name:ex.name, bw:ex.bw,
        sets: Array.from({length:ex.targetSets},()=>({ id:uid(), reps:ex.targetReps, kg:ex.bw?0:20, done:false })),
      })),
    };
    update(s=>({ ...s, sessions:[...s.sessions,session], activeSessionId:id }));
    setWorkout({ sessionId:id, kind });
  };

  const closeWorkout = () => {
    setWorkout(null);
    setTab('home');
  };

  return (
    <AppFrame T={T}>
      {/* Tab screens (always rendered, one at a time) */}
      {tab==='home'&&<HomeScreen state={state} update={update} T={T} onStartWorkout={startWorkout}/>}
      {tab==='cal'&&<CalendarScreen state={state} update={update} T={T} onStartWorkout={startWorkout} onEditProgram={k=>{setEditProgKey(k);}}/>}
      {tab==='stats'&&<StatsScreen state={state} T={T} programs={programs}/>}
      {tab==='me'&&<ProfileScreen state={state} update={update} T={T}/>}

      {/* Backup banner — shown above tab bar when due */}
      <BackupBanner state={state} update={update} T={T}/>

      {/* Tab bar — always visible */}
      <TabBar active={tab} onChange={setTab} T={T}/>

      {/* Workout overlay */}
      {workout&&(
        <div style={{ position:'absolute', inset:0, zIndex:100, background:T.bg, display:'flex', flexDirection:'column' }} className="slide-up">
          <WorkoutScreen
            sessionId={workout.sessionId}
            kind={workout.kind}
            sessions={state.sessions}
            update={update}
            T={T}
            programs={programs}
            onClose={closeWorkout}
          />
        </div>
      )}

      {/* Program editor overlay */}
      {editProgKey&&(
        <ProgramEditorScreen
          progKey={editProgKey}
          programs={programs}
          update={update}
          T={T}
          onClose={()=>setEditProgKey(null)}
        />
      )}
    </AppFrame>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
